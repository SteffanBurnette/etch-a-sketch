<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel = "stylesheet" href = "myStackedModal.css">
</head>
<body>
    <button id = "openModal">Sign Up</button>
    <dialog id = "modal">
        <fieldset>
            <legend>User Information</legend>

            <label for="username">Username:</label>
            <input type="text" id="username" name="username">

            <label for="email">Email:</label>
            <input type="email" id="email" name="email">

            <label for="phone_number">Phone Number:</label>
            <input type="tel" id="phone_number" name="phone_number">
        </fieldset>

        <fieldset>
            <legend>Additional Information</legend>

            <label for="address"> Street Address:</label>
            <input type="text" id="address" name="address">

            <label for="zip_code">Zip Code:</label>
            <input type="number" id="zip_code" name="zip_code">

            <label for="city">City:</label>
            <input type="text" id="city" name="city">

            <label for="state">State:</label>
            <input type="text" id="state" name="state">
        </fieldset>

        <filedset id="additional_info">
            
            <div class="form_space">
            <p>What is your gender?</p>

            <div>
                <input type="radio" name="gender" value="male">
                <label for="male">Male</label>    
            </div>
            <div>
                <input type="radio" name="gender" value="female">
                <label for="female">Female</label>    
            </div>

            </div>

            <div class="form_space">
            <p>What is your age range?</p>

            <div>
                <input type="radio" name="age" value="18">
                <label for="18">~18</label>    
            </div>
            <div>
                <input type="radio" name="age" value="26">
                <label for="26">19~26</label>    
            </div>
            <div>
                <input type="radio" name="age" value="35">
                <label for="35">26~35</label>    
            </div>
            <div>
                <input type="radio" name="age" value="36">
                <label for="36">36+</label>    
            </div>

            </div>
        </filedset>

        <button type="submit" id="sumbit_form">Submit Form</button>
        <button id="closeModal">Cancel Application</button>
    </dialog>
    <script src = "myStackedModal.js"></script>
</body>
</html>
